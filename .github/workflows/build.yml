name: Build Vet Windows EXE

on:
    push:
        branches:
            - main
    workflow_dispatch:

# electron-builder publishes a GitHub Release. No-op while GH_TOKEN is a PAT,
# but required if this is ever switched to the built-in GITHUB_TOKEN.
permissions:
    contents: write

jobs:
    windows:
        name: Build Windows EXE
        runs-on: windows-latest

        steps:
            # 1️⃣ Checkout repository
            # v5 runs on the Node 24 action runtime. v3 ran on Node 16, which is
            # gone — runners default to Node 24 since 16 June 2026.
            - name: Checkout Repository
              uses: actions/checkout@v5

            # 2️⃣ Setup Node.js
            # v5 runs on Node 24 (v3 = Node 16, v4 = Node 20; both EOL).
            # `cache: npm` reuses the npm cache across runs — it needs a
            # package-lock.json, which this repo has.
            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: npm

            # 3️⃣ Install main dependencies
            - name: Install Electron App Dependencies
              run: npm ci

            # 4️⃣ Create the release tag
            #
            # package.json sets "releaseType": "release", so electron-builder asks
            # GitHub for a PUBLISHED (non-draft) release. GitHub rejects that with
            #   422 "Published releases must have a valid tag"
            # unless the tag already exists — and nothing here ever created it,
            # since the workflow only pushes to main.
            #
            # So tag the commit first. Idempotent: if the version was not bumped,
            # the tag is already on origin and we reuse it (electron-builder then
            # just refreshes that release's assets).
            - name: Create Release Tag
              shell: bash
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  TAG="v$VERSION"

                  if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
                      echo "Tag $TAG already exists on origin — reusing it."
                  else
                      git config user.name "github-actions[bot]"
                      git config user.email "github-actions[bot]@users.noreply.github.com"
                      git tag -a "$TAG" -m "Release $TAG"
                      git push origin "$TAG"
                      echo "Created and pushed $TAG"
                  fi

            # 5️⃣ Build & publish the Windows EXE
            - name: Build & Publish EXE
              run: npx electron-builder --x64 --win --publish always
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}

            # 6️⃣ Upload EXE artifact (optional — the release above already
            # publishes it). v6 is the first major that runs on Node 24 by
            # default; v5 still defaulted to Node 20.
            # - name: Upload EXE Artifact
            #   uses: actions/upload-artifact@v6
            #   with:
            #       name: vet
            #       path: dist/*.exe
