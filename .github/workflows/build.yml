name: Build Vet Windows EXE

on:
    push:
        branches:
            - main
    workflow_dispatch:

# electron-builder publishes a GitHub Release. No-op while GH_TOKEN is a PAT,
# but required if this is ever switched to the built-in GITHUB_TOKEN.
permissions:
    contents: write

jobs:
    windows:
        name: Build Windows EXE
        runs-on: windows-latest

        steps:
            # 1️⃣ Checkout repository
            # v5 runs on the Node 24 action runtime. v3 ran on Node 16, which is
            # gone — runners default to Node 24 since 16 June 2026.
            - name: Checkout Repository
              uses: actions/checkout@v5

            # 2️⃣ Setup Node.js
            # v5 runs on Node 24 (v3 = Node 16, v4 = Node 20; both EOL).
            # `cache: npm` reuses the npm cache across runs — it needs a
            # package-lock.json, which this repo has.
            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: npm

            # 3️⃣ Install main dependencies
            - name: Install Electron App Dependencies
              run: npm ci

            # 4️⃣ Make sure the tag AND the release already exist
            #
            # Two problems this solves, both seen in real builds:
            #
            #  a) package.json sets "releaseType": "release", so electron-builder
            #     asks for a PUBLISHED (non-draft) release. GitHub refuses that
            #     with 422 "Published releases must have a valid tag" if the tag
            #     does not exist — and nothing here used to create it.
            #
            #  b) electron-builder publishes its artifacts CONCURRENTLY. When the
            #     release is missing, each artifact's publisher races to create
            #     it, and GitHub happily allows two releases on the same tag — so
            #     the assets get split across them (v2.24.2 ended up with the
            #     .exe on one release and only the .blockmap on the other).
            #
            # Creating the release up front removes the "create" path entirely:
            # every publisher then just finds it and uploads into it. Idempotent —
            # re-running without a version bump reuses the existing release.
            - name: Ensure GitHub Release Exists
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  TAG="v$VERSION"

                  if gh release view "$TAG" > /dev/null 2>&1; then
                      echo "Release $TAG already exists — electron-builder will upload into it."
                  else
                      # also creates the tag on this commit if it isn't there yet
                      gh release create "$TAG" \
                          --target "$GITHUB_SHA" \
                          --title "$TAG" \
                          --notes "Release $TAG"
                      echo "Created release $TAG"
                  fi

            # 5️⃣ Build & publish the Windows EXE
            - name: Build & Publish EXE
              run: npx electron-builder --x64 --win --publish always
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}

            # 6️⃣ Upload EXE artifact (optional — the release above already
            # publishes it). v6 is the first major that runs on Node 24 by
            # default; v5 still defaulted to Node 20.
            # - name: Upload EXE Artifact
            #   uses: actions/upload-artifact@v6
            #   with:
            #       name: vet
            #       path: dist/*.exe
