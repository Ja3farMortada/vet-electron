name: Build Vet Windows EXE

on:
    push:
        branches:
            - main
    workflow_dispatch:

# electron-builder publishes a GitHub Release. No-op while GH_TOKEN is a PAT,
# but required if this is ever switched to the built-in GITHUB_TOKEN.
permissions:
    contents: write

jobs:
    windows:
        name: Build Windows EXE
        runs-on: windows-latest

        steps:
            # 1️⃣ Checkout repository
            # v5 runs on the Node 24 action runtime. v3 ran on Node 16, which is
            # gone — runners default to Node 24 since 16 June 2026.
            - name: Checkout Repository
              uses: actions/checkout@v5

            # 2️⃣ Setup Node.js
            # v5 runs on Node 24 (v3 = Node 16, v4 = Node 20; both EOL).
            # `cache: npm` reuses the npm cache across runs — it needs a
            # package-lock.json, which this repo has.
            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: npm

            # 3️⃣ Install main dependencies
            - name: Install Electron App Dependencies
              run: npm ci

            # 4️⃣ Build & publish the Windows EXE
            - name: Build & Publish EXE
              run: npx electron-builder --x64 --win --publish always
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}

            # 5️⃣ Upload EXE artifact (optional — the release above already
            # publishes it). v6 is the first major that runs on Node 24 by
            # default; v5 still defaulted to Node 20.
            # - name: Upload EXE Artifact
            #   uses: actions/upload-artifact@v6
            #   with:
            #       name: vet
            #       path: dist/*.exe
