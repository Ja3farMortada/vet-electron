<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Stock</title>
        <link
            rel="stylesheet"
            href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
        />
        <link rel="stylesheet" href="printStyle.css" />
        <script src="../node_modules/vue/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app" class="container-fluid">
            <table class="table table-sm table-bordered text-center">
                <thead>
                    <tr>
                        <!-- <th>SKU</th> -->
                        <th>Description</th>
                        <th>Category</th>
                        <th>Qty</th>
                        <!-- <th>Avg Cost</th> -->
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="(record, index) in data" :key="index">
                        <!-- <td>{{ record.sku }}</td> -->
                        <td>{{ record.product_name }}</td>
                        <td>{{ record.category_name }}</td>
                        <td>{{ record.quantity }}</td>
                        <!-- <td>{{ record.avg_cost_usd | currency }}</td> -->
                        <td>{{ formatCurrency(record.unit_price_usd) }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <script>
            const { createApp } = Vue;

            createApp({
                data() {
                    return {
                        data: [],
                        chunks: [],
                    };
                },
                methods: {
                    formatCurrency(value) {
                        if (value === undefined || value === null) return "";
                        return new Intl.NumberFormat("en-US", {
                            style: "currency",
                            currency: "USD",
                        }).format(value);
                    },
                    splitArrayIntoChunks(array, chunkSize) {
                        this.chunks = [];
                        for (let i = 0; i < array.length; i += chunkSize) {
                            this.chunks.push(array.slice(i, i + chunkSize));
                        }

                        return this.chunks;
                    },
                },
                mounted() {
                    if (window.electron && window.electron.print) {
                        window.electron.print((event, data) => {
                            console.log(data);
                            this.data = data;
                        });
                    }
                },
            }).mount("#app");
        </script>
    </body>
</html>
